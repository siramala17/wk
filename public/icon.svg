<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#ececec"/>
    </linearGradient>
    <linearGradient id="hGrad" x1="5%" y1="5%" x2="95%" y2="95%">
      <stop offset="0%"  style="stop-color:#b3e0ff"/>
      <stop offset="30%" style="stop-color:#42b4f5"/>
      <stop offset="65%" style="stop-color:#1e88e5"/>
      <stop offset="100%" style="stop-color:#1555b8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="8" stdDeviation="14"
        flood-color="rgba(21,85,184,0.38)"/>
    </filter>
    <clipPath id="hClip">
      <!-- Left pillar -->
      <rect x="100" y="90" width="110" height="332" rx="55"/>
      <!-- Right pillar -->
      <rect x="302" y="90" width="110" height="332" rx="55"/>
      <!-- Crossbar -->
      <rect x="100" y="215" width="312" height="82" rx="41"/>
      <!-- Top-left liquid blob -->
      <circle cx="148" cy="148" r="72"/>
      <!-- Bottom-right liquid blob -->
      <circle cx="364" cy="374" r="72"/>
    </clipPath>
  </defs>

  <!-- White background -->
  <rect width="512" height="512" rx="100" fill="url(#bgGrad)"/>

  <!-- H shape with shadow -->
  <g filter="url(#shadow)">
    <rect width="512" height="512" fill="url(#hGrad)" clip-path="url(#hClip)"/>
  </g>

  <!-- Glossy highlights -->
  <g clip-path="url(#hClip)">
    <ellipse cx="168" cy="152" rx="62" ry="44"
      fill="rgba(255,255,255,0.48)"/>
    <rect x="112" y="216" width="180" height="30" rx="15"
      fill="rgba(255,255,255,0.22)"/>
  </g>
</svg>
